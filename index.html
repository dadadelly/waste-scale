<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ตาชั่งขยะรีไซเคิล</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Thasadith:wght@400;700&display=swap');

  :root { /* [ใช้ Color Variables เดิมของคุณได้เลย ผมขอย่อไว้เพื่อความกะทัดรัด] */
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350;
    --text: #e8eaf6; --muted: #6b7280; --green: #22c55e; --green-dim: #16a34a22;
    --amber: #f59e0b; --red: #ef4444; --blue: #60a5fa; --teal: #2dd4bf;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; min-height: 100vh; }

  /* CSS จัดการสลับหน้าจอ */
  .screen { display: none; padding-bottom: 40px; }
  .screen.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* --- หน้าเลือกเครื่อง --- */
  .machine-select-container { padding: 30px 20px; text-align: center; }
  .logo-icon { font-size: 60px; margin-bottom: 10px; }
  .machine-btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; background: var(--surface); border: 2px solid var(--border);
    border-radius: 16px; padding: 20px; margin-bottom: 16px;
    color: var(--text); font-size: 18px; font-family: 'Sarabun', sans-serif;
    cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .machine-btn:active { transform: scale(0.98); border-color: var(--teal); background: #2dd4bf15; }
  .machine-btn .m-name { font-weight: 700; }
  .machine-btn .m-id { font-size: 14px; color: var(--muted); background: var(--surface2); padding: 4px 10px; border-radius: 10px; }

  /* --- ส่วนของหน้าตาชั่ง (เอา CSS เดิมของคุณมาใส่ตรงนี้ได้เลย) --- */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;}
  .header-title { font-family: 'Thasadith'; font-size: 18px; font-weight: 700; color: var(--teal); }
  .header-sub { font-size: 11px; color: var(--muted); }
  .mqtt-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); transition: background 0.4s; box-shadow: 0 0 0 3px #ef444422; }
  .mqtt-dot.connected { background: var(--green); box-shadow: 0 0 0 3px #22c55e22; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px #22c55e22; } 50% { box-shadow: 0 0 0 6px #22c55e11; } }

  .weight-card { margin: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px 20px 20px; text-align: center; position: relative; }
  .weight-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--teal), var(--blue)); border-radius: 20px 20px 0 0; }
  .weight-label { font-size: 12px; color: var(--muted); }
  .weight-value { font-family: 'Thasadith'; font-size: 64px; font-weight: 700; color: var(--text); margin: 8px 0 4px; }
  .weight-value.stable { color: var(--green); }
  .weight-unit { font-size: 20px; color: var(--muted); }
  .stable-badge { display: inline-block; margin-top: 10px; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; background: var(--green-dim); color: var(--green); border: 1px solid #22c55e44; opacity: 0; }
  .stable-badge.show { opacity: 1; }
  .tare-btn { margin-top: 14px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 6px 18px; border-radius: 20px; cursor: pointer; }
  
  .section { margin: 0 16px 16px; }
  .section-title { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .type-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 12px 6px; text-align: center; cursor: pointer; }
  .type-btn.selected { border-color: var(--teal); background: #2dd4bf15; }
  .type-btn.selected .name { color: var(--teal); }
  .type-btn .icon { font-size: 24px; display: block; }
  .type-btn .name { font-size: 13px; color: var(--muted); font-weight: 600; }
  .type-btn .co2 { font-size: 10px; color: var(--muted); }

  .add-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #2dd4bf, #60a5fa); border: none; border-radius: 16px; color: #0f1117; font-size: 17px; font-weight: 700; cursor: pointer; }
  .add-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
  
  .save-btn { width: 100%; padding: 18px; background: var(--surface); border: 2px solid var(--green); border-radius: 16px; color: var(--green); font-size: 18px; font-weight: 700; cursor: pointer; }
  .save-btn:disabled { border-color: var(--border); color: var(--muted); }

  .session-list { display: flex; flex-direction: column; gap: 8px; }
  .session-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .empty { text-align: center; padding: 30px; color: var(--muted); }
  
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); border-radius: 30px; padding: 10px 22px; font-weight: 600; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { color: var(--green); }
</style>
</head>
<body>

<!-- ================= หน้า 1: เลือกเครื่อง ================= -->
<div id="screen-machine" class="screen active">
  <div class="machine-select-container">
    <div class="logo-icon">♻️</div>
    <h2 style="margin-bottom: 5px;">ระบบชั่งขยะรีไซเคิล</h2>
    <p style="color: var(--muted); margin-bottom: 30px; font-size: 14px;">กรุณาเลือกเครื่องที่คุณกำลังใช้งาน</p>

    <!-- รายการเครื่อง (สร้างจาก JS) -->
    <div id="machine-list"></div>
  </div>
</div>

<!-- ================= หน้า 2: แอปตาชั่งหลัก ================= -->
<div id="screen-app" class="screen">
  <div class="header">
    <div>
      <div class="header-title">♻ เครื่อง: <span id="display-m-name" style="color:white;"></span></div>
      <div class="header-sub" id="conn-label">กำลังเชื่อมต่อ...</div>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <!-- ปุ่มออกจากเครื่อง -->
      <button onclick="exitMachine()" style="background:var(--red); color:white; border:none; padding:5px 10px; border-radius:8px; font-size:12px; font-family:'Sarabun'; cursor:pointer;">
        ออกจากเครื่อง
      </button>
      <div class="mqtt-dot" id="mqtt-dot"></div>
    </div>
  </div>

  <div class="weight-card">
    <div class="weight-label">น้ำหนักปัจจุบัน</div>
    <div class="weight-value" id="weight-display">0.000</div>
    <div class="weight-unit">กิโลกรัม</div>
    <div class="stable-badge" id="stable-badge">✓ ค่าคงที่ พร้อมบันทึก</div>
    <br>
    <button class="tare-btn" onclick="sendTare()">⚖ ปรับศูนย์ (Tare)</button>
  </div>

  <div class="section">
    <div class="section-title">เลือกประเภทขยะ</div>
    <div class="type-grid" id="type-grid"></div>
  </div>

  <div class="section"><button class="add-btn" id="add-btn" onclick="addToSession()" disabled>+ เพิ่มในรอบนี้</button></div>

  <div class="section">
    <div class="section-title">รายการในรอบนี้</div>
    <div class="session-list" id="session-list"></div>
  </div>

  <div class="section"><button class="save-btn" id="save-btn" onclick="saveSession()" disabled>💾 บันทึกรอบชั่ง</button></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  Config ข้อมูลเครื่อง & ประเภทขยะ
// ============================================================
const MACHINES = [
  { id: 'M1', name: 'เครื่องที่ 1 (โซน A)' },
  { id: 'M2', name: 'เครื่องที่ 2 (โซน B)' },
  { id: 'M3', name: 'เครื่องที่ 3 (โซน C)' }
];

const WASTE_TYPES = [
  { id: 'general',  name: 'ทั่วไป',    icon: '🗑',  co2: 0.52 },
  { id: 'plastic',  name: 'พลาสติก',  icon: '🧴',  co2: 1.03 },
  { id: 'glass',    name: 'แก้ว',      icon: '🍶',  co2: 0.28 },
  { id: 'metal',    name: 'โลหะ',      icon: '🔩',  co2: 1.75 },
  { id: 'paper',    name: 'กระดาษ',   icon: '📄',  co2: 0.94 }
];

// ============================================================
//  MQTT & State variables
// ============================================================
const MQTT_BROKER = 'wss://broker.hivemq.com:8884/mqtt';
const BASE_TOPIC  = 'buen/1650902081/waste/';
let TOPIC_WEIGHT, TOPIC_TYPE, TOPIC_SAVE, TOPIC_STATUS;

let mqttClient     = null;
let currentMachine = null;
let currentWeight  = 0;
let isStable       = false;
let selectedType   = null;
let session        = [];

// ============================================================
//  1. สร้างหน้าเลือกเครื่อง
// ============================================================
const mList = document.getElementById('machine-list');
MACHINES.forEach(m => {
  const btn = document.createElement('div');
  btn.className = 'machine-btn';
  btn.innerHTML = `<span class="m-name">${m.name}</span> <span class="m-id">${m.id}</span>`;
  btn.onclick = () => selectMachine(m);
  mList.appendChild(btn);
});

function selectMachine(m) {
  currentMachine = m;
  
  // ตั้งค่า Topic สำหรับรอรับค่าจากเครื่อง (อันนี้ถูกแล้ว)
  TOPIC_WEIGHT = BASE_TOPIC + m.id + '/weight';
  TOPIC_TYPE   = BASE_TOPIC + m.id + '/type';
  TOPIC_SAVE   = BASE_TOPIC + m.id + '/save';
  TOPIC_STATUS = BASE_TOPIC + m.id + '/status';

  document.getElementById('display-m-name').textContent = m.name;
  document.getElementById('screen-machine').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');

  connectMQTT();

  setTimeout(() => {
    // *** แก้ไขจุดนี้: ส่งหา Node-RED แทนการส่งหาบอร์ดโดยตรง ***
    publish('web/request/' + m.id, 'start'); 
    
    showToast('เชื่อมต่อกับเครื่อง ' + m.id + ' แล้ว', 'success');
  }, 1000);
}
// ฟังก์ชันออกจากเครื่อง (กลับหน้าแรก)
function exitMachine() {
  if (confirm('คุณต้องการออกจากเครื่อง ' + currentMachine.id + ' ใช่หรือไม่?')) {
    // *** แก้ไขจุดนี้: ส่ง 'stop' ไปที่ Node-RED ***
    publish('web/request/' + currentMachine.id, 'stop');
    
    session = [];
    selectedType = null;
    renderSession();
    
    if (mqttClient) mqttClient.end();
    document.getElementById('screen-app').classList.remove('active');
    document.getElementById('screen-machine').classList.add('active');
    
    showToast('ออกจากเครื่องแล้ว', 'success');
  }
}

// ============================================================
//  2. สร้างปุ่มประเภทขยะ
// ============================================================
const grid = document.getElementById('type-grid');
WASTE_TYPES.forEach(t => {
  const btn = document.createElement('div');
  btn.className = 'type-btn';
  btn.id = 'type-' + t.id;
  btn.innerHTML = `<span class="icon">${t.icon}</span><span class="name">${t.name}</span><span class="co2">CO₂ ×${t.co2}</span>`;
  btn.onclick = () => selectType(t);
  grid.appendChild(btn);
});

function selectType(t) {
  selectedType = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('type-' + t.id).classList.add('selected');
  publish(TOPIC_TYPE, t.name); // ส่งบอกเครื่องว่าเลือกประเภทอะไร
  updateAddBtn();
}

// ============================================================
//  3. ระบบ MQTT
// ============================================================
function connectMQTT() {
  const clientId = 'UI-' + currentMachine.id + '-' + Math.random().toString(16).slice(2,8);
  mqttClient = mqtt.connect(MQTT_BROKER, { clientId, clean: true });

  mqttClient.on('connect', () => {
    setConnected(true);
    mqttClient.subscribe([TOPIC_WEIGHT, TOPIC_STATUS]); // ฟังเฉพาะเครื่องตัวเอง

    publish(TOPIC_SAVE, 'start'); 
    showToast('เชื่อมต่อกับเครื่อง ' + currentMachine.id + ' แล้ว', 'success');
  });

  mqttClient.on('message', (topic, payload) => {
    const msg = payload.toString().trim();
    if (topic === TOPIC_WEIGHT) handleWeight(msg);
    if (topic === TOPIC_STATUS) handleStatus(msg);
  });

  mqttClient.on('close', () => setConnected(false));
  mqttClient.on('error', () => setConnected(false));
}

function publish(topic, msg) {
  if (mqttClient && mqttClient.connected) mqttClient.publish(topic, msg);
}

function setConnected(ok) {
  document.getElementById('mqtt-dot').classList.toggle('connected', ok);
  document.getElementById('conn-label').textContent = ok ? 'เชื่อมต่อแล้ว' : 'หลุดการเชื่อมต่อ';
}

function handleWeight(msg) {
  const parts = msg.split(',');
  if (parts.length < 1) return;
  currentWeight = parseFloat(parts[0]) || 0;
  isStable = parts[2] === '1';

  const el = document.getElementById('weight-display');
  el.textContent = currentWeight.toFixed(3);
  el.classList.toggle('stable', isStable);
  document.getElementById('stable-badge').classList.toggle('show', isStable);
  updateAddBtn();
}

function handleStatus(msg) {
  if (msg.startsWith('saved:')) showToast('✓ บันทึกสำเร็จแล้วค่ะ', 'success');
  else if (msg === 'tared') showToast('⚖ ปรับศูนย์แล้ว', 'success');
}

// ============================================================
//  4. จัดการ Session (เอาฟังก์ชันเดิมมาใส่ได้เลย)
// ============================================================
function updateAddBtn() {
  document.getElementById('add-btn').disabled = !(selectedType && currentWeight > 0.005);
}

function addToSession() {
  if (!selectedType || currentWeight <= 0.005) return;
  session.push({ type: selectedType.name, icon: selectedType.icon, weight: +currentWeight.toFixed(3), co2: +(currentWeight * selectedType.co2).toFixed(3) });
  renderSession();
  showToast(`เพิ่ม ${selectedType.name} ${currentWeight.toFixed(3)} kg`, 'success');
}

function renderSession() {
  const list = document.getElementById('session-list');
  const saveBtn = document.getElementById('save-btn');
  if (session.length === 0) {
    list.innerHTML = `<div class="empty">ยังไม่มีรายการ<br>เลือกประเภทและกดเพิ่ม</div>`;
    saveBtn.disabled = true; return;
  }
  list.innerHTML = session.map((item, i) => `
      <div class="session-item">
        <div><span style="font-size:20px">${item.icon}</span> <b>${item.type}</b></div>
        <div style="text-align:right">
          <div><b>${item.weight.toFixed(3)} kg</b></div>
          <div style="font-size:10px; color:var(--teal)">ลด CO₂: ${item.co2.toFixed(2)} kg</div>
        </div>
      </div>
  `).join('');
  saveBtn.disabled = false;
}

function saveSession() {
  if (session.length === 0) return;
  publish(TOPIC_SAVE, 'save');
  
  // ตัวอย่างส่งข้อมูลไป Database/Node-RED แยกตามเครื่อง
  publish('buen/1650902081/waste/db', JSON.stringify({ machine: currentMachine.id, items: session }));
  
  showToast('💾 บันทึกรอบชั่งแล้วค่ะ', 'success');
  setTimeout(() => { session = []; renderSession(); document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected')); selectedType=null; updateAddBtn(); }, 1500);
}

function sendTare() { publish(TOPIC_SAVE, 'tare'); }

let toastTimer;
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

renderSession();
</script>
</body>
</html>
